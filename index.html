<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>MHMB</title>
  </head>
  <body>
    <header>
      <h1>MHMDB</h1>
      <strong>※ 몬스터 헌터 시리즈, 업데이트 순이 아닌 종별 가나다순임을 알려드립니다.
        <br>또한, 킹 차차브(중형몬스터)와 아트랄 네세트(아트랄 카 허성형태), 몬헌 프론티어는 제외한 점 알려드립니다.
        <br>필터 기능은 추가 업데이트될 예정
      </strong>
    </header>

    <main>
      <div class="radio-wrap">
        <ul class="radio-list">
          <li class="typeLi">
            <input type="radio" id="type" name="radioGroup" value="type">
            <label for="type">종별</label>
          </li>
          <li class="seriesLi">
            <input type="radio" id="series" name="radioGroup" value="series">
            <label for="series">시리즈</label>
          </li>
        </ul>
      </div>
      <div class="list-wrap">
        <ul class="type-list">
        </ul>
        <ul class="work-list"></ul>
      </div>

      <div class="monster-wrap">
        <ul class="monster-list"></ul>
      </div>
    </main>

    <footer>
      <strong>이미지 출처 <cite>나무위키</cite></strong>
    </footer>
    <script src="index.js"></script>
  </body>
</html>
